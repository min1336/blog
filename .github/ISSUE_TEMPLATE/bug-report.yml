name: 버그 리포트
description: 버그를 신고합니다
labels: ["type/bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 버그 리포트
        발견한 문제를 설명해주세요.
        AI가 자동으로 분석하고, 수정 가능한 경우 자동으로 수정을 시작합니다.

  - type: textarea
    id: description
    attributes:
      label: 어떤 문제가 있나요?
      description: 문제 상황을 자유롭게 설명해주세요
      placeholder: |
        예: 로그인 버튼을 클릭하면 페이지가 새로고침되고 로그인이 안 돼요.
        크롬 브라우저에서 발생하고, 어제부터 이런 현상이 생겼어요.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      description: 문제를 재현하는 단계를 알려주세요
      placeholder: |
        1. 로그인 페이지에 접속
        2. 이메일과 비밀번호 입력
        3. 로그인 버튼 클릭
        4. 페이지가 새로고침되며 로그인 실패
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대한 동작
      description: 정상적으로 동작했다면 어떻게 되어야 하나요?
      placeholder: "로그인 버튼을 클릭하면 대시보드 페이지로 이동해야 합니다."
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: 스크린샷
      description: 문제 화면을 캡처해서 첨부해주세요
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: 심각도
      options:
        - "서비스 이용 불가"
        - "주요 기능 오류"
        - "사소한 문제"
    validations:
      required: true
