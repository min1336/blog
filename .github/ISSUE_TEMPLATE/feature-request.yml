name: 기능 요청
description: 새로운 기능을 요청합니다
labels: []
body:
  - type: markdown
    attributes:
      value: |
        ## 기능 요청
        원하는 기능을 자유롭게 설명해주세요.
        이슈가 생성되면 AI가 자동으로 분류하고, 적합한 경우 자동으로 구현을 시작합니다.

  - type: textarea
    id: description
    attributes:
      label: 어떤 기능이 필요한가요?
      description: 원하는 기능을 자유롭게 설명해주세요
      placeholder: |
        예: 로그인 페이지에 소셜 로그인(Google, GitHub) 버튼을 추가하고 싶어요.
        기존 이메일 로그인 폼 아래에 구분선을 넣고, 소셜 로그인 버튼을 배치해주세요.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 추가 맥락
      description: 스크린샷, 참고 링크, 디자인 시안 등이 있으면 첨부해주세요
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - "높음 (업무에 지장)"
        - "보통"
        - "낮음 (있으면 좋겠음)"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 카테고리
      options:
        - "UI/디자인"
        - "기능 추가"
        - "버그 수정"
        - "성능 개선"
        - "문서"
        - "기타"
    validations:
      required: true
