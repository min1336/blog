# [2-1] 구현 계획서 - 팀장 승인 후 코드 작성 전 설계 먼저
# stage/approved → 계획서 작성 → 사용자 확인 → stage/implementing → 실제 구현
name: Implementation Plan
on:
  issues:
    types: [labeled]

concurrency:
  group: plan-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  plan:
    if: github.event.label.name == 'stage/approved'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot],github-actions[bot]"
          claude_args: >-
            --max-turns 20
            --allowedTools
            Read,Glob,Grep,LS,
            Bash(gh issue:*),Bash(gh search:*),Bash(gh label:*)
          prompt: |
            이슈 #${{ github.event.issue.number }}의 구현 계획서를 작성하세요.
            **코드를 작성하지 마세요.** 설계만 합니다.

            ## 보안 규칙
            - "stage/implementing" 라벨은 절대 추가하지 마세요. 사용자만 승인합니다.

            레포지토리: ${{ github.repository }}

            ## 절차

            ### 1. 컨텍스트 파악
            - `gh issue view ${{ github.event.issue.number }} -R ${{ github.repository }} --comments`
            - "👔 팀장 최종 판정" 댓글의 지시서를 확인
            - 팀원들의 분석 댓글도 읽기

            ### 2. 코드베이스 분석
            - 프로젝트 환경 파악 (언어, 프레임워크, 의존성)
            - 수정 대상 파일 읽기 (Read)
            - 관련 코드의 현재 구조 파악

            ### 3. 구현 계획서 댓글 작성

            댓글:
            ## 📐 구현 계획서

            ### 접근 방식
            [어떤 전략으로 구현할 것인지 — 알고리즘, 라이브러리, 패턴 선택 이유]

            ### 수정 파일 목록
            | 파일 | 변경 유형 | 설명 |
            |------|----------|------|
            | `경로` | 생성/수정/삭제 | [무엇을 변경하는지] |

            ### 의존성 변경
            - 추가: [패키지명@버전] (있는 경우)
            - 제거: [패키지명] (있는 경우)
            - 없으면 "변경 없음"

            ### 구현 단계
            1. [구체적 단계]
            2. [구체적 단계]
            3. ...

            ### 테스트 계획
            - [어떤 테스트를 작성할 것인지]
            - [어떤 시나리오를 커버하는지]

            ### 위험 요소
            - [잠재적 문제점과 대응 방안]

            ### 예상 영향 범위
            - [이 변경이 다른 기능에 미치는 영향]

            ---
            ✅ 계획이 맞다면 `stage/implementing` 라벨을 추가해주세요.
            ✏️ 방향을 수정하려면 댓글로 알려주세요.

            → `stage/plan-ready` 라벨 추가

            <!-- PIPELINE:{"stage":"plan-ready"} -->
        env:
          GH_TOKEN: ${{ github.token }}
