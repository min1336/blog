name: AI Pipeline

on:
  issues:
    types: [opened, labeled]

jobs:
  enrich:
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'opened'
    uses: min1336/ai-pipeline/.github/workflows/enrich.yml@main
    secrets:
      CLAUDE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
