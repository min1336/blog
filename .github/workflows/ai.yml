# ============================================================================
# AI Pipeline 오케스트레이터
# 이 파일을 프로젝트 레포의 .github/workflows/ai.yml에 복사하세요.
#
# 흐름:
#   이슈 생성 → 구체화 → 세분화 → [사람 승인] → 구현 → PR → 리뷰 → 머지
#
# 사전 준비:
#   1. 레포 Settings > Secrets에 CLAUDE_OAUTH_TOKEN 추가
#   2. .github/pipeline.yml 생성 (templates/pipeline.yml 참조)
#   3. AGENTS.md 생성 (templates/AGENTS.md 참조)
# ============================================================================

name: AI Pipeline

on:
  # 이슈 이벤트 → 구체화, 세분화, 구현 트리거
  issues:
    types: [opened, labeled]

  # PR 이벤트 → 자동 리뷰
  pull_request:
    types: [opened, synchronize, ready_for_review]

  # 리뷰 결과 → 수정 요청 시 자동 수정
  pull_request_review:
    types: [submitted]

  # PR/이슈 코멘트 → @claude 명령어 라우팅
  issue_comment:
    types: [created]

  # CI 실패 → 자동 수정 (CI 워크플로우가 있을 때 활성화)
  # workflow_run:
  #   workflows: ["CI"]
  #   types: [completed]

  # 주간 유지보수 (매주 월요일 09:00 KST)
  schedule:
    - cron: "0 0 * * 1"

# 동시 실행 제어: 같은 이슈/PR에 대해 하나만 실행
concurrency:
  group: ai-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: 이슈 구체화
  # 트리거: 이슈가 새로 열렸을 때
  # 결과: stage/enriched 라벨 부착 (또는 추가 정보 요청)
  # ──────────────────────────────────────────────
  enrich:
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'opened' &&
      !contains(github.event.issue.labels.*.name, 'skip-ai')
    uses: min1336/ai-pipeline/.github/workflows/enrich.yml@main
    secrets:
      CLAUDE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}

  # ──────────────────────────────────────────────
  # Stage 2: 이슈 세분화 + 구현 계획
  # 트리거: stage/enriched 라벨이 붙었을 때
  # 결과: 구현 계획 댓글 + stage/ready 라벨
  # ── Human-in-the-loop ──
  # AI가 stage/ready를 붙이면, 사람이 계획을 확인하고
  # stage/approved 라벨을 달아야 구현이 시작됩니다.
  # ──────────────────────────────────────────────
  decompose:
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'stage/enriched'
    uses: min1336/ai-pipeline/.github/workflows/decompose.yml@main
    secrets:
      CLAUDE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}

  # ──────────────────────────────────────────────
  # Stage 3: 자동 구현
  # 트리거: 사람이 stage/approved 라벨을 붙였을 때
  # 결과: 브랜치 생성 + 코드 구현 + PR 생성
  # ──────────────────────────────────────────────
  implement:
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'stage/approved'
    uses: min1336/ai-pipeline/.github/workflows/implement.yml@main
    secrets:
      CLAUDE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}

  # ──────────────────────────────────────────────
  # Stage 4: PR 자동 리뷰
  # 트리거: PR이 열리거나 업데이트될 때
  # 결과: 리뷰 댓글 + 점수 + 판정
  # ──────────────────────────────────────────────
  review:
    if: >-
      github.event_name == 'pull_request' &&
      !github.event.pull_request.draft &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ai')
    uses: min1336/ai-pipeline/.github/workflows/review.yml@main
    secrets:
      CLAUDE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}

  # ──────────────────────────────────────────────
  # Stage 4a: 리뷰 피드백 자동 반영
  # 트리거: 리뷰어가 changes_requested를 했을 때
  # 결과: 피드백 반영 커밋
  # ──────────────────────────────────────────────
  fix-pr:
    if: >-
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'changes_requested'
    uses: min1336/ai-pipeline/.github/workflows/fix-pr.yml@main
    with:
      pr-number: ${{ github.event.pull_request.number }}
    secrets:
      CLAUDE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}

  # ──────────────────────────────────────────────
  # CI 실패 자동 수정
  # 트리거: CI 워크플로우가 실패했을 때
  # 결과: 수정 커밋 (최대 N회)
  # ──────────────────────────────────────────────
  # fix-ci:
  #   if: >-
  #     github.event_name == 'workflow_run' &&
  #     github.event.workflow_run.conclusion == 'failure' &&
  #     github.event.workflow_run.head_branch != github.event.repository.default_branch
  #   uses: min1336/ai-pipeline/.github/workflows/ci-fix.yml@main
  #   with:
  #     run-id: ${{ github.event.workflow_run.id }}
  #   secrets:
  #     CLAUDE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}

  # ──────────────────────────────────────────────
  # @claude 명령어 라우팅
  # 트리거: 이슈/PR 코멘트에 @claude로 시작하는 명령
  # 지원 명령:
  #   @claude enrich    — 이슈 재분석
  #   @claude decompose — 구현 계획 재작성
  #   @claude implement — 구현 시작 (stage/ready 필요)
  #   @claude review    — PR 리뷰 재실행
  #   @claude fix       — PR 리뷰 피드백 반영
  # ──────────────────────────────────────────────
  command:
    if: >-
      github.event_name == 'issue_comment' &&
      startsWith(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: min1336/ai-pipeline/actions/load-skills@main

      - id: config
        uses: min1336/ai-pipeline/actions/parse-pipeline@main

      - name: 명령어 파싱
        id: parse
        shell: bash
        run: |
          COMMENT="${{ github.event.comment.body }}"
          CMD=$(echo "$COMMENT" | head -1 | sed 's/@claude\s*//' | awk '{print $1}')
          ARGS=$(echo "$COMMENT" | head -1 | sed 's/@claude\s*//' | awk '{$1=""; print $0}' | xargs)
          NUMBER="${{ github.event.issue.number }}"

          echo "command=$CMD" >> "$GITHUB_OUTPUT"
          echo "args=${ARGS:-$NUMBER}" >> "$GITHUB_OUTPUT"
          echo "number=$NUMBER" >> "$GITHUB_OUTPUT"

          # 명령어 유효성 검사
          case "$CMD" in
            enrich|decompose|implement|review|fix|help)
              echo "valid=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "valid=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: help 응답
        if: steps.parse.outputs.command == 'help' || steps.parse.outputs.valid == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const body = steps.parse.outputs.valid === 'false'
              ? `알 수 없는 명령어: \`${context.payload.comment.body}\`\n\n`
              : '';
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: ${{ github.event.issue.number }},
              body: body + `## 사용 가능한 명령어\n
            | 명령어 | 설명 |
            |--------|------|
            | \`@claude enrich\` | 이슈 재분석 |
            | \`@claude decompose\` | 구현 계획 재작성 |
            | \`@claude implement\` | 구현 시작 |
            | \`@claude review\` | PR 리뷰 |
            | \`@claude fix\` | 리뷰 피드백 반영 |
            | \`@claude help\` | 이 도움말 |`
            });

      - name: 스킬 실행
        if: steps.parse.outputs.valid == 'true' && steps.parse.outputs.command != 'help'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            ## 프로젝트 설정
            - 언어: ${{ steps.config.outputs.language }}
            - 테스트: ${{ steps.config.outputs.test-command }}
            - 린트: ${{ steps.config.outputs.lint-command }}

            ---
            /${{ steps.parse.outputs.command == 'enrich' && 'enrich-issue' || steps.parse.outputs.command == 'decompose' && 'decompose-issue' || steps.parse.outputs.command == 'review' && 'review-pr' || steps.parse.outputs.command == 'fix' && 'fix-pr' || steps.parse.outputs.command }} ${{ steps.parse.outputs.args }}
          claude_args: |
            --max-turns 30

  # ──────────────────────────────────────────────
  # 주간 유지보수
  # 트리거: 매주 월요일 (cron)
  # 결과: stale 이슈 관리, 보안 감사, 주간 리포트
  # ──────────────────────────────────────────────
  maintenance:
    if: github.event_name == 'schedule'
    uses: min1336/ai-pipeline/.github/workflows/maintenance.yml@main
    secrets:
      CLAUDE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
