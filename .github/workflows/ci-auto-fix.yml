# [4] CI 실패 자동 수정 - CI가 실패하면 에러 로그를 분석하여 자동 수정 (언어 무관)
name: Auto-Fix CI Failures
on:
  workflow_run:
    workflows: ["Deploy Backend"]
    types: [completed]

jobs:
  auto-fix:
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.pull_requests[0] != null &&
      !startsWith(github.event.workflow_run.head_branch, 'claude-auto-fix-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Check previous fix attempts (max 2)
        id: check-attempts
        run: |
          ATTEMPTS=$(git log --oneline --grep="fix: CI 실패 수정" --since="24 hours ago" | wc -l)
          echo "attempts=$ATTEMPTS" >> "$GITHUB_OUTPUT"
          if [ "$ATTEMPTS" -ge 2 ]; then
            echo "::warning::CI 자동 수정 24시간 내 2회 초과 — 수동 확인 필요"
            PR_NUM=$(gh pr list -R ${{ github.repository }} --head "${{ github.event.workflow_run.head_branch }}" --json number --jq '.[0].number // empty')
            if [ -n "$PR_NUM" ]; then
              gh pr comment "$PR_NUM" -R ${{ github.repository }} --body "⚠️ **CI 자동 수정 중단**: 24시간 내 2회 시도했으나 여전히 실패합니다. 수동 확인이 필요합니다."
            fi
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: anthropics/claude-code-action@v1
        if: steps.check-attempts.outputs.attempts < 2
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          additional_permissions: "actions: read"
          claude_args: >-
            --max-turns 15
            --allowedTools
            mcp__github_ci__get_ci_status,
            mcp__github_ci__get_workflow_run_details,
            mcp__github_ci__download_job_log,
            Edit,MultiEdit,Write,Read,Glob,Grep,LS,
            Bash(git:*),Bash(npm:*),Bash(npx:*),Bash(yarn:*),Bash(pnpm:*),
            Bash(pip:*),Bash(python:*),Bash(poetry:*),Bash(uv:*),
            Bash(go:*),Bash(cargo:*),Bash(make:*),Bash(gradle:*),Bash(mvn:*),
            Bash(bundle:*),Bash(gem:*),
            Bash(gh pr comment:*)
          prompt: |
            CI가 실패했습니다. 에러를 분석하고 수정하세요.

            REPO: ${{ github.repository }}
            Workflow Run ID: ${{ github.event.workflow_run.id }}
            브랜치: ${{ github.event.workflow_run.head_branch }}

            ## 분석 절차
            1. `mcp__github_ci__get_workflow_run_details`로 실패한 작업 확인
            2. `mcp__github_ci__download_job_log`로 에러 로그 상세 분석
            3. 프로젝트의 언어/프레임워크/도구 파악
            4. 에러 원인에 해당하는 코드를 찾아 수정
            5. 수정 후 프로젝트의 도구로 검증:
               - 테스트 실행
               - 린트 실행 (있는 경우)
               - 타입 체크 실행 (있는 경우)
            6. 수정사항을 동일 브랜치에 커밋
               - 커밋 메시지: "fix: CI 실패 수정 - [원인 요약]"
            7. PR에 댓글로 수정 내용 작성:
               - 실패 원인
               - 수정 내용
               - 검증 결과
