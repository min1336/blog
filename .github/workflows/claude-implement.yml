# [3] 자동 구현 - 구현 계획서 승인(stage/implementing) 후 코드 작성
name: Claude Auto-Implement
on:
  issues:
    types: [labeled]

concurrency:
  group: claude-implement-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  implement:
    if: github.event.label.name == 'stage/implementing'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    timeout-minutes: 30
    steps:
      - name: Check for existing PR
        id: check-pr
        run: |
          PR_COUNT=$(gh pr list -R ${{ github.repository }} --search "Closes #${{ github.event.issue.number }}" --state open --json number --jq 'length')
          echo "has_pr=$([[ "$PR_COUNT" -gt 0 ]] && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Skip if PR already exists
        if: steps.check-pr.outputs.has_pr == 'true'
        run: |
          echo "::notice::PR already exists for issue #${{ github.event.issue.number }}, skipping implementation"
          exit 0

      - name: Debounce (wait for all labels to settle)
        if: steps.check-pr.outputs.has_pr != 'true'
        run: sleep 15

      - uses: actions/checkout@v4
        if: steps.check-pr.outputs.has_pr != 'true'
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        if: steps.check-pr.outputs.has_pr != 'true'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot],github-actions[bot]"
          track_progress: "true"
          use_commit_signing: "true"
          claude_args: >-
            --max-turns 50
            --allowedTools
            Edit,MultiEdit,Write,Read,Glob,Grep,LS,
            Bash(git:*),Bash(npm:*),Bash(npx:*),Bash(yarn:*),Bash(pnpm:*),
            Bash(pip:*),Bash(python:*),Bash(poetry:*),Bash(uv:*),
            Bash(go:*),Bash(cargo:*),Bash(make:*),Bash(gradle:*),Bash(mvn:*),
            Bash(bundle:*),Bash(gem:*),
            Bash(gh:*)
          prompt: |
            이슈 #${{ github.event.issue.number }}을 구현하세요. 레포: ${{ github.repository }}

            ## 도구
            - 이슈+댓글 읽기: `gh issue view ${{ github.event.issue.number }} -R ${{ github.repository }} --comments`
            - 댓글 달기: `gh issue comment ${{ github.event.issue.number }} -R ${{ github.repository }} --body "내용"`
            - PR 생성: `gh pr create -R ${{ github.repository }} --title "제목" --body "본문"`

            ## 중요: 구현 계획서와 팀장 지시서를 따르세요
            먼저 `gh issue view`로 이슈 댓글을 모두 읽으세요.
            1. "📐 구현 계획서" 댓글의 접근 방식과 수정 파일 목록을 따르세요.
            2. "👔 팀장 최종 판정" 댓글의 지시서를 따르세요.
            계획서의 방향을 임의로 변경하지 마세요.

            ## 구현 순서
            1. 이슈 댓글 읽기 → 구현 계획서 + 팀장 지시서 + 팀 분석 파악
            2. 프로젝트 환경 파악 (언어, 프레임워크, 도구)
            3. 의존성 설치
            4. 팀장 지시서의 "필수 구현" 항목 구현
            5. "필수 보안 조치" 적용
            6. "필수 테스트" 시나리오를 테스트 코드로 작성 + 전체 테스트 실행
            7. 린터/포매터/타입체커 실행 (있는 경우)
            8. 커밋 (conventional commits, 한국어)
            9. `gh pr create` 로 PR 생성
               - 본문에 `Closes #${{ github.event.issue.number }}` 포함
               - 팀 리뷰 반영 내용 요약
            10. 이슈에 완료 댓글: "PR #XX 생성 완료"
        env:
          GH_TOKEN: ${{ github.token }}
