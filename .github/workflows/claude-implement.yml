# [3] 자동 구현 - 팀장의 "approved" 라벨 후 구현 지시서 기반으로 코드 작성
name: Claude Auto-Implement
on:
  issues:
    types: [labeled]

concurrency:
  group: claude-implement-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  implement:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --max-turns 25
            --allowedTools
            Edit,MultiEdit,Write,Read,Glob,Grep,LS,
            Bash(git:*),Bash(npm:*),Bash(npx:*),Bash(yarn:*),Bash(pnpm:*),
            Bash(pip:*),Bash(python:*),Bash(poetry:*),Bash(uv:*),
            Bash(go:*),Bash(cargo:*),Bash(make:*),Bash(gradle:*),Bash(mvn:*),
            Bash(bundle:*),Bash(gem:*),
            Bash(gh pr create:*),Bash(gh pr edit:*),
            mcp__github__get_issue,mcp__github__get_issue_comments,
            mcp__github__create_issue_comment
          prompt: |
            이슈 #${{ github.event.issue.number }}을 구현하세요.

            ## 중요: 팀장 지시서를 따르세요
            이슈 댓글에서 "👔 팀장 최종 판정" 댓글을 찾아 읽으세요.
            그 지시서의 내용을 **정확히** 따라 구현합니다.

            지시서에 포함된 것:
            - 필수 구현 항목
            - 필수 보안 조치 (화이트해커 의견)
            - 필수 테스트 (QA 의견)
            - 코드 컨벤션 (리뷰어 의견)
            - 범위 외 항목 (이것은 하지 말 것)

            또한 🏗️ 아키텍트의 설계 댓글도 참고하세요.

            ## 구현 순서

            ### Step 1: 지시서 + 팀 분석 읽기
            mcp__github__get_issue_comments로 모든 댓글을 읽고
            팀장 지시서, 아키텍트 설계, 보안 요구사항, QA 시나리오를 파악

            ### Step 2: 프로젝트 환경 파악
            프로젝트의 언어, 프레임워크, 도구 파악
            의존성 설치

            ### Step 3: 코드 구현
            팀장 지시서의 "필수 구현" 항목을 순서대로 구현
            아키텍트 설계를 따르고, 리뷰어가 제시한 기존 패턴을 준수

            ### Step 4: 보안 조치
            화이트해커가 제시한 "필수 보안 조치"를 모두 적용

            ### Step 5: 테스트
            QA가 제시한 "필수 테스트" 시나리오를 테스트 코드로 작성
            전체 테스트 실행하여 통과 확인

            ### Step 6: 검증
            프로젝트에 린터/포매터/타입체커가 있으면 실행하고 에러 수정

            ### Step 7: 커밋 & PR
            커밋 메시지: conventional commits (한국어)
            `gh pr create` 로 PR 생성:
            - 제목: 이슈 제목 기반
            - 본문:

            ```
            ## 요약
            [구현 내용]

            ## 팀 리뷰 반영
            - 🏗️ 아키텍트 설계: [반영 내용]
            - 🛡️ 보안 조치: [반영 내용]
            - 🧪 테스트: [반영 내용]
            - 🔍 코드 패턴: [반영 내용]

            ## 검증
            - [x] 테스트 통과
            - [x] Lint 통과 (해당되는 경우)
            - [x] 타입 체크 통과 (해당되는 경우)

            Closes #${{ github.event.issue.number }}
            ```

            ### Step 8: 이슈 댓글
            이슈에 구현 완료 댓글 작성:
            "구현이 완료되어 PR #XX을 생성했습니다. 팀 리뷰를 반영한 내용: [요약]"
