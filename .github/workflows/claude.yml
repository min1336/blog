# [5] 후속 대화 - claude 라벨이 있는 이슈에서 댓글 달면 자동 반응
name: Claude Interactive
on:
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}-${{ github.triggering_actor }}
  cancel-in-progress: true

jobs:
  claude:
    if: |
      github.event.sender.type != 'Bot' &&
      contains(toJSON(github.event.issue.labels.*.name), 'claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
