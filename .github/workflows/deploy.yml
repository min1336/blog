name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: "deploy-prod-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get Github Actions IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      # TODO: AWS OIDC 인증으로 전환 권장 (장기 Access Key 대신 단기 토큰)
      # permissions에 id-token: write 추가 + role-to-assume 설정 필요
      # https://github.com/aws-actions/configure-aws-credentials#oidc
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Add Github Actions IP to Security group
        run: |
          OUTPUT=$(aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32 2>&1) || {
            if echo "$OUTPUT" | grep -q "already exists"; then
              echo "Security group rule already exists, skipping"
            else
              echo "::error::Failed to add security group rule: $OUTPUT"
              exit 1
            fi
          }

      - name: Wait for Security Group rule propagation
        run: |
          for i in 1 2 3; do
            sleep 5
            echo "Waiting for propagation... (attempt $i/3)"
          done

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/min1336/blog-backend:latest
            ghcr.io/min1336/blog-backend:sha-${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          capture_stdout: true
          script: |
            cd ~/blog
            git pull
            source .env

            # DB 마이그레이션
            docker-compose exec -T mysql mysql -ublog -p"$DB_PASSWORD" blog <<'EOSQL'
              CREATE TABLE IF NOT EXISTS setting (
                `key` varchar(255) NOT NULL PRIMARY KEY,
                value text NOT NULL
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

              CREATE TABLE IF NOT EXISTS categories (
                id int NOT NULL AUTO_INCREMENT PRIMARY KEY,
                name varchar(100) NOT NULL,
                slug varchar(100) NOT NULL UNIQUE,
                parent_id int DEFAULT NULL,
                sort_order int NOT NULL DEFAULT 0,
                created_at datetime(6) NOT NULL DEFAULT CURRENT_TIMESTAMP(6),
                updated_at datetime(6) NOT NULL DEFAULT CURRENT_TIMESTAMP(6) ON UPDATE CURRENT_TIMESTAMP(6),
                INDEX idx_categories_parent_id (parent_id),
                FOREIGN KEY (parent_id) REFERENCES categories(id) ON DELETE RESTRICT
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
            EOSQL

            # posts 테이블에 category_id 컬럼 추가 (없으면)
            docker-compose exec -T mysql mysql -ublog -p"$DB_PASSWORD" blog -e \
              "SELECT COLUMN_NAME FROM INFORMATION_SCHEMA.COLUMNS WHERE TABLE_SCHEMA='blog' AND TABLE_NAME='posts' AND COLUMN_NAME='category_id'" \
              2>/dev/null | grep -q category_id || \
              docker-compose exec -T mysql mysql -ublog -p"$DB_PASSWORD" blog -e \
              "ALTER TABLE posts ADD COLUMN category_id int DEFAULT NULL, ADD INDEX idx_posts_category_id (category_id)" 2>/dev/null

            echo "Migration done"

            docker-compose pull backend
            docker-compose up -d
            sleep 20
            echo "=== API Test ==="
            curl -s http://localhost:4000/api/health
            echo ""
            curl -s http://localhost:4000/api/categories
            echo ""
            if docker-compose ps backend | grep -qE "(Up|running)"; then
              echo "Backend OK"
            else
              echo "Backend FAILED"
              docker-compose logs --tail=30 backend
              exit 1
            fi

      - name: Remove Github Actions IP from Security Group
        if: always()
        run: |
          OUTPUT=$(aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32 2>&1) || {
            if echo "$OUTPUT" | grep -q "does not exist"; then
              echo "Security group rule already removed"
            else
              echo "::warning::Failed to remove security group rule: $OUTPUT"
            fi
          }
