name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: "deploy-prod-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get Github Actions IP
        id: ip
        uses: haythem/public-ip@v1.3

      # TODO: AWS OIDC 인증으로 전환 권장 (장기 Access Key 대신 단기 토큰)
      # permissions에 id-token: write 추가 + role-to-assume 설정 필요
      # https://github.com/aws-actions/configure-aws-credentials#oidc
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Add Github Actions IP to Security group
        run: |
          OUTPUT=$(aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32 2>&1) || {
            if echo "$OUTPUT" | grep -q "already exists"; then
              echo "Security group rule already exists, skipping"
            else
              echo "::error::Failed to add security group rule: $OUTPUT"
              exit 1
            fi
          }

      - name: Wait for Security Group rule propagation
        run: |
          for i in 1 2 3; do
            sleep 5
            echo "Waiting for propagation... (attempt $i/3)"
          done

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/min1336/blog-backend:latest
            ghcr.io/min1336/blog-backend:sha-${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/blog
            git pull
            source .env

            # 새 테이블 마이그레이션 (setting)
            docker-compose exec -T mysql mysql -ublog -p"$DB_PASSWORD" blog -e "
              CREATE TABLE IF NOT EXISTS setting (
                \`key\` varchar(255) NOT NULL PRIMARY KEY,
                value text NOT NULL
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
            " 2>/dev/null || echo "Migration skipped (MySQL not ready)"

            docker-compose pull backend
            docker-compose up -d
            echo "Waiting for backend to start..."
            sleep 15
            if docker-compose ps backend | grep -qE "(Up|running)"; then
              echo "Health check passed: backend is running"
            else
              echo "Health check FAILED: backend is not running"
              docker-compose logs --tail=50 backend
              exit 1
            fi

      - name: Remove Github Actions IP from Security Group
        if: always()
        run: |
          OUTPUT=$(aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32 2>&1) || {
            if echo "$OUTPUT" | grep -q "does not exist"; then
              echo "Security group rule already removed"
            else
              echo "::warning::Failed to remove security group rule: $OUTPUT"
            fi
          }
