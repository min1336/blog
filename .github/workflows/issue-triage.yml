# [1] 이슈 자동 분류 + 팀 선별 - 이슈 분석 → 적절한 팀 라벨 부여
name: Issue Triage
on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_non_write_users: "*"
          claude_args: >-
            --max-turns 6
            --allowedTools
            Read,Glob,Grep,LS,
            mcp__github__get_issue,mcp__github__update_issue,
            mcp__github__create_issue_comment,mcp__github__search_issues,
            mcp__github__list_issues
          prompt: |
            이슈 #${{ github.event.issue.number }}을 분석하여 분류하고 적절한 팀을 배정하세요.

            이슈 내용:
            제목: ${{ github.event.issue.title }}
            본문: ${{ github.event.issue.body }}

            ## 1단계: 중복 검사
            유사한 이슈를 검색하세요.
            - 중복이면: "duplicate" 라벨 + 원본 링크 댓글 → 여기서 종료

            ## 2단계: 카테고리 라벨
            해당되는 것 모두 적용:
            - bug / enhancement / feature / documentation / question

            우선순위:
            - priority: high — 서비스 장애, 보안, 데이터 손실
            - priority: medium — 주요 기능
            - priority: low — 사소한 개선

            ## 3단계: 팀 선별 (핵심)
            이슈 내용을 분석하여 가장 적절한 팀을 선택하세요.

            ### 팀 구성표

            **team/full** — 전원 8명 출동. 다음 경우에 선택:
            - 여러 도메인에 걸친 대규모 기능
            - 결제, 인증 등 보안+UX+비즈니스 모두 중요한 기능
            - 아키텍처 변경이 필요한 작업
            - 판단이 어려운 복잡한 요청

            **team/tech** — 아키텍트 + 화이트해커 + QA + 리뷰어. 다음 경우에 선택:
            - API 개발, DB 스키마 변경, 백엔드 로직
            - 성능 최적화, 리팩토링
            - 인프라, CI/CD 관련

            **team/product** — PO + 디자이너 + CS + 마케팅. 다음 경우에 선택:
            - 새로운 제품 기능 기획 (구현 전 논의 필요)
            - 사용자 피드백 기반 개선 요청
            - 비즈니스 로직 변경

            **team/design** — 디자이너 + 리뷰어 + PO. 다음 경우에 선택:
            - UI/UX 변경, 디자인 수정
            - 새 페이지/컴포넌트 추가
            - 접근성 개선

            **team/bug** — 화이트해커 + QA + 리뷰어. 다음 경우에 선택:
            - 버그 리포트
            - 오류/크래시 수정
            - 보안 취약점 리포트

            **team/docs** — PO + 마케팅 + 리뷰어. 다음 경우에 선택:
            - 문서 작성/수정
            - README, 가이드, 튜토리얼
            - SEO 관련 변경

            ## 4단계: 라벨 적용
            1. 카테고리 라벨 (bug, feature 등)
            2. 우선순위 라벨
            3. "claude" 라벨 (질문/토론 제외)
            4. 팀 라벨 (team/full, team/tech 등 **하나만**)

            ## 5단계: 댓글 작성
            분류 결과와 배정된 팀을 안내하는 댓글을 작성하세요:

            ---
            🤖 **이슈 분류 완료**

            **카테고리**: [라벨들]
            **우선순위**: [high/medium/low]
            **배정 팀**: [팀 이름과 구성원]

            [팀 배정 이유 한줄 설명]

            팀 토론이 곧 시작됩니다.
            ---
