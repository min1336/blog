# [4-1] PR 리뷰 피드백 자동 수정 - 팀장이 "수정 후 머지"/"수정 필요" 판정 시 자동 수정
# 수정 후 push → pr-review.yml이 synchronize로 재트리거 → 재리뷰 루프
name: PR Auto-Fix from Review
on:
  issue_comment:
    types: [created]

concurrency:
  group: pr-auto-fix-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  auto-fix:
    # PR 댓글 + 팀장 판정 키워드 감지 (봇/사람 모두 허용)
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '팀장 종합 판정') &&
      (contains(github.event.comment.body, '수정 후 머지') || contains(github.event.comment.body, '수정 필요'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    timeout-minutes: 20
    steps:
      - name: Get PR branch
        id: pr-info
        run: |
          PR_DATA=$(gh pr view ${{ github.event.issue.number }} -R ${{ github.repository }} --json headRefName,commits --jq '{branch: .headRefName, commits: (.commits | length)}')
          echo "branch=$(echo $PR_DATA | jq -r '.branch')" >> "$GITHUB_OUTPUT"

          # 무한루프 방지: auto-fix 커밋이 2회 이상이면 중단
          FIX_COUNT=$(gh pr view ${{ github.event.issue.number }} -R ${{ github.repository }} --json commits --jq '[.commits[].messageHeadline | select(startswith("fix: PR 리뷰"))] | length')
          echo "fix_count=$FIX_COUNT" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Skip if too many fix attempts
        if: steps.pr-info.outputs.fix_count >= 2
        run: |
          gh pr comment ${{ github.event.issue.number }} -R ${{ github.repository }} --body "⚠️ **자동 수정 중단**: 2회 시도했으나 리뷰를 통과하지 못했습니다. 수동 확인이 필요합니다."
          exit 0
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/checkout@v4
        if: steps.pr-info.outputs.fix_count < 2
        with:
          ref: ${{ steps.pr-info.outputs.branch }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        if: steps.pr-info.outputs.fix_count < 2
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot],github-actions[bot]"
          use_commit_signing: "true"
          claude_args: >-
            --max-turns 30
            --allowedTools
            Edit,MultiEdit,Write,Read,Glob,Grep,LS,
            Bash(git:*),Bash(npm:*),Bash(npx:*),Bash(yarn:*),Bash(pnpm:*),
            Bash(pip:*),Bash(python:*),Bash(poetry:*),Bash(uv:*),
            Bash(go:*),Bash(cargo:*),Bash(make:*),Bash(gradle:*),Bash(mvn:*),
            Bash(bundle:*),Bash(gem:*),
            Bash(gh pr view:*),Bash(gh pr comment:*)
          prompt: |
            PR #${{ github.event.issue.number }}의 코드 리뷰 피드백을 반영하여 코드를 수정하세요.
            레포: ${{ github.repository }}

            ## 절차

            ### 1. 리뷰 피드백 읽기
            `gh pr view ${{ github.event.issue.number }} -R ${{ github.repository }} --comments --json comments`
            로 모든 리뷰 댓글을 읽으세요.

            "👔 팀장 종합 판정" 댓글에서 🔴 **필수 수정** 항목을 확인하세요.
            인라인 코멘트도 확인하세요:
            `gh pr view ${{ github.event.issue.number }} -R ${{ github.repository }} --json reviews --jq '.reviews[].body'`

            ### 2. 수정 사항 구현
            - 필수 수정(🔴) 항목을 모두 반영
            - 권장 사항(🟡)도 가능하면 반영
            - 수정 시 기존 기능을 깨뜨리지 않도록 주의

            ### 3. 검증
            - 프로젝트의 테스트 실행
            - 린트/포매터 실행 (있는 경우)
            - 타입 체크 실행 (있는 경우)

            ### 4. 커밋 + 푸시
            커밋 메시지: "fix: PR 리뷰 피드백 반영 - [수정 내용 요약]"
            동일 브랜치에 푸시하세요.
            (푸시하면 pr-review.yml이 자동으로 재리뷰를 시작합니다)

            ### 5. PR 댓글
            수정 내용을 PR에 댓글로 작성:
            ## 🔧 리뷰 피드백 반영 완료
            | 지적 사항 | 수정 내용 |
            |----------|----------|
            | [지적1] | [수정1] |
            자동 재리뷰가 시작됩니다.
        env:
          GH_TOKEN: ${{ github.token }}

      # GITHUB_TOKEN push는 후속 워크플로우를 트리거하지 않으므로
      # workflow_dispatch로 직접 재리뷰 호출
      - name: Trigger re-review
        if: steps.pr-info.outputs.fix_count < 2
        run: |
          gh workflow run "Team PR Review" \
            -R ${{ github.repository }} \
            -f pr_number=${{ github.event.issue.number }}
        env:
          GH_TOKEN: ${{ github.token }}
