# [2] AI 팀 토론 - 팀 라벨에 따라 해당 역할만 분석/토론
name: Team Discussion
on:
  issues:
    types: [labeled]

concurrency:
  group: team-discuss-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  setup:
    if: startsWith(github.event.label.name, 'team/')
    runs-on: ubuntu-latest
    outputs:
      roles: ${{ steps.resolve.outputs.roles }}
    steps:
      # 라벨이 여러 개 동시에 추가될 때 중복 실행을 방지하는 debounce
      # concurrency.cancel-in-progress: true와 함께 동작하여 마지막 실행만 유지
      - name: Debounce (wait for all labels to settle)
        run: sleep 15

      - name: Assess complexity and resolve team roles
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            // 이슈 정보 가져오기
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number
            });

            const body = (issue.title + ' ' + (issue.body || '')).toLowerCase();
            const labels = issue.labels.map(l => l.name);
            const teamLabel = '${{ github.event.label.name }}';

            // 팀별 전체 역할 매핑
            const fullTeams = {
              'team/full':    ['architect','security','qa','reviewer','designer','cs','po','marketing'],
              'team/tech':    ['architect','security','qa','reviewer'],
              'team/product': ['po','designer','cs','marketing'],
              'team/design':  ['designer','reviewer','po'],
              'team/bug':     ['security','qa','reviewer'],
              'team/docs':    ['po','marketing','reviewer']
            };

            let roles = fullTeams[teamLabel] || ['architect','security','qa','reviewer'];

            // 복잡도 평가: 단순/보통/복잡
            let complexity = 'normal';

            // 단순 판정: 짧은 이슈 + 낮은 우선순위 키워드
            const simpleKeywords = ['오타','typo','색상','color','텍스트 변경','문구 수정','오류 메시지','readme'];
            const isShort = (issue.body || '').length < 200;
            const isSimpleContent = simpleKeywords.some(k => body.includes(k));
            const isLowPriority = labels.includes('priority/low');

            if ((isShort && isSimpleContent) || (isLowPriority && isSimpleContent)) {
              complexity = 'simple';
            }

            // 복잡 판정: 여러 시스템 영향 키워드
            const complexKeywords = ['인증','결제','마이그레이션','리팩토링','아키텍처','보안','데이터베이스','api 변경'];
            const isHighPriority = labels.includes('priority/high');
            const isComplexContent = complexKeywords.filter(k => body.includes(k)).length >= 2;

            if (isHighPriority || isComplexContent) {
              complexity = 'complex';
            }

            // 복잡도에 따라 역할 필터링
            if (complexity === 'simple' && roles.length > 2) {
              // 단순: 핵심 2명만 (reviewer + 해당 전문가 1명)
              const priority = ['reviewer','qa','security','architect','designer','po'];
              const filtered = priority.filter(r => roles.includes(r)).slice(0, 2);
              roles = filtered.length >= 2 ? filtered : roles.slice(0, 2);
            } else if (complexity === 'normal' && roles.length > 4) {
              // 보통: 핵심 기술 역할만 (최대 4명)
              const techRoles = ['architect','security','qa','reviewer'];
              const filtered = roles.filter(r => techRoles.includes(r));
              roles = filtered.length > 0 ? filtered : roles.slice(0, 4);
            }
            // 복잡: 전체 팀 유지

            core.info(`Complexity: ${complexity}, Team: ${teamLabel}, Roles: ${JSON.stringify(roles)}`);
            core.setOutput('roles', JSON.stringify(roles));
            core.setOutput('complexity', complexity);

  analyze:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    timeout-minutes: 10
    strategy:
      matrix:
        role: ${{ fromJSON(needs.setup.outputs.roles) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot],github-actions[bot]"
          claude_args: >-
            --max-turns 12
            --allowedTools Read,Glob,Grep,LS,Bash(gh issue:*),Bash(gh search:*)
          prompt: |
            이슈 #${{ github.event.issue.number }}에 대해 당신의 역할로 분석하고 댓글을 작성하세요.
            먼저 이슈 내용과 프로젝트 코드를 읽고 분석하세요.

            도구:
            - 이슈 보기: `gh issue view ${{ github.event.issue.number }} -R ${{ github.repository }} --comments`
            - 댓글 달기: `gh issue comment ${{ github.event.issue.number }} -R ${{ github.repository }} --body "내용"`

            ${{ matrix.role == 'architect' && '## 🏗️ 아키텍트\n시스템 설계 전문가. 프로젝트 구조 파악, 구현 설계, 의존성, 확장성 분석.\n댓글: ## 🏗️ 아키텍트 분석' || '' }}
            ${{ matrix.role == 'security' && '## 🛡️ 화이트해커\n보안 전문가. OWASP Top 10, 입력 검증, 인증/인가, 암호화 분석.\n\n먼저 /security-audit 슬래시 명령(.claude/commands/security-audit.md)을 읽고 그 지침을 따르세요.\n댓글: ## 🛡️ 보안 분석' || '' }}
            ${{ matrix.role == 'qa' && '## 🧪 QA 엔지니어\n품질 전문가. 테스트 시나리오(정상/엣지/실패), 회귀 위험 분석.\n댓글: ## 🧪 QA 분석' || '' }}
            ${{ matrix.role == 'reviewer' && '## 🔍 코드 리뷰어\n코드 품질 전문가. 기존 패턴, 재사용 코드, 컨벤션, 성능 분석.\n댓글: ## 🔍 코드 리뷰어 분석' || '' }}
            ${{ matrix.role == 'designer' && '## 🎨 디자이너\nUI/UX 전문가. 디자인 시스템, 사용자 플로우, 접근성, 반응형 분석.\n댓글: ## 🎨 디자이너 분석' || '' }}
            ${{ matrix.role == 'cs' && '## 💬 CS\n고객 관점 전문가. 사용자 경험, 에러 메시지, FAQ, 기존 사용자 영향 분석.\n댓글: ## 💬 CS 분석' || '' }}
            ${{ matrix.role == 'po' && '## 📋 PO\n비즈니스 전문가. 비즈니스 가치, MVP 범위, 성공 지표, 우선순위 분석.\n댓글: ## 📋 PO 분석' || '' }}
            ${{ matrix.role == 'marketing' && '## 📢 마케팅\n성장 전문가. 사용자 유입/전환, SEO, 출시 커뮤니케이션 분석.\n댓글: ## 📢 마케팅 분석' || '' }}
        env:
          GH_TOKEN: ${{ github.token }}

  team-lead:
    needs: [setup, analyze]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot],github-actions[bot]"
          claude_args: >-
            --max-turns 8
            --allowedTools Read,Glob,Grep,LS,Bash(gh issue:*),Bash(gh label:*)
          prompt: |
            당신은 👔 **팀장**입니다.
            이슈 #${{ github.event.issue.number }}에 대해 팀원들의 분석을 종합하세요.

            도구:
            - 댓글 읽기: `gh issue view ${{ github.event.issue.number }} -R ${{ github.repository }} --comments`
            - 댓글 달기: `gh issue comment ${{ github.event.issue.number }} -R ${{ github.repository }} --body "내용"`
            - 라벨 추가: `gh issue edit ${{ github.event.issue.number }} --add-label "라벨" -R ${{ github.repository }}`
            - 라벨 생성: `gh label create "이름" --color "색상" -R ${{ github.repository }}`

            절차:
            1. `gh issue view`로 팀원 댓글 모두 읽기
            2. 의견 종합: 충돌 조정, 범위 확정, 보안/테스트 필수항목 선별
            3. 최종 댓글 작성 (아래 형식)
            4. 라벨: 승인→"stage/approved" / 보류→"stage/on-hold" / 추가정보→"stage/needs-info"

            댓글 형식:
            ## 👔 팀장 최종 판정
            ### 결정: ✅ 구현 승인 (또는 ❌ 보류 / ❓ 추가 정보 필요)
            ### 구현 지시서
            #### 필수 구현
            #### 필수 보안 조치
            #### 필수 테스트
            #### 코드 컨벤션
            ### 범위 외
            ---
            🤖 이 지시서를 기반으로 구현 계획서 작성이 시작됩니다.

            <!-- PIPELINE:{"stage":"discussed"} -->
        env:
          GH_TOKEN: ${{ github.token }}
